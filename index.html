<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Roller Coaster</title>
<style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
let scene, camera, renderer, coaster;
let curve, progress = 0;

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 50, 300);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(50, 50, 50);
    light.castShadow = true;
    scene.add(light);

    scene.add(new THREE.AmbientLight(0x404040));

    const groundGeo = new THREE.PlaneGeometry(500, 500);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    curve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(-50, 10, 0),
        new THREE.Vector3(0, 40, -50),
        new THREE.Vector3(50, 10, 0),
        new THREE.Vector3(0, 60, 50),
        new THREE.Vector3(-50, 10, 0)
    ]);

    const tubeGeometry = new THREE.TubeGeometry(curve, 200, 1, 16, true);
    const tubeMaterial = new THREE.MeshStandardMaterial({
        color: 0x00ffff,
        emissive: 0x004444
    });

    const track = new THREE.Mesh(tubeGeometry, tubeMaterial);
    track.castShadow = true;
    scene.add(track);

    coaster = new THREE.Group();

    const base = new THREE.Mesh(
        new THREE.BoxGeometry(4, 1, 3),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
    );

    const seat = new THREE.Mesh(
        new THREE.BoxGeometry(3, 1, 2),
        new THREE.MeshStandardMaterial({ color: 0xff0055 })
    );
    seat.position.set(0, 1, 0);

    const backrest = new THREE.Mesh(
        new THREE.BoxGeometry(3, 2, 0.5),
        new THREE.MeshStandardMaterial({ color: 0xaa0033 })
    );
    backrest.position.set(0, 2, -0.75);

    coaster.add(base, seat, backrest);

    const skin = new THREE.MeshStandardMaterial({ color: 0xffcc99 });

    const rider = new THREE.Group();

    const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.8, 16, 16),
        skin
    );
    head.position.set(0, 3.4, 0);

    const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.7, 0.9, 2.5, 16),
        new THREE.MeshStandardMaterial({ color: 0x00aaff })
    );
    body.position.set(0, 2, 0);

    const armGeo = new THREE.CylinderGeometry(0.2, 0.2, 2.5);

    const leftArm = new THREE.Mesh(armGeo, skin);
    leftArm.position.set(-1, 3, 0);
    leftArm.rotation.z = Math.PI / 2;
    leftArm.rotation.x = -Math.PI / 2;

    const rightArm = new THREE.Mesh(armGeo, skin);
    rightArm.position.set(1, 3, 0);
    rightArm.rotation.z = -Math.PI / 2;
    rightArm.rotation.x = -Math.PI / 2;

    const legGeo = new THREE.CylinderGeometry(0.25, 0.25, 2);

    const leftLeg = new THREE.Mesh(legGeo, skin);
    leftLeg.position.set(-0.5, 1, 1);
    leftLeg.rotation.x = Math.PI / 2;

    const rightLeg = new THREE.Mesh(legGeo, skin);
    rightLeg.position.set(0.5, 1, 1);
    rightLeg.rotation.x = Math.PI / 2;

    rider.add(head, body, leftArm, rightArm, leftLeg, rightLeg);

    // EJ LABEL
    const canvasLabel = document.createElement('canvas');
    const ctx = canvasLabel.getContext('2d');
    canvasLabel.width = 256;
    canvasLabel.height = 128;

    ctx.fillStyle = "white";
    ctx.font = "bold 60px Arial";
    ctx.textAlign = "center";
    ctx.fillText("EJ", 128, 80);

    const texture = new THREE.CanvasTexture(canvasLabel);
    const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMaterial);

    sprite.scale.set(5, 2.5, 1);
    sprite.position.set(0, 5, 0);

    rider.add(sprite);

    coaster.add(rider);

    coaster.traverse(obj => obj.castShadow = true);
    scene.add(coaster);

    for (let i = 0; i < 30; i++) {
        const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(1.5, 16, 16),
            new THREE.MeshStandardMaterial({
                color: Math.random() * 0xffffff,
                emissive: Math.random() * 0x222222
            })
        );
        sphere.position.set(
            (Math.random() - 0.5) * 200,
            Math.random() * 30,
            (Math.random() - 0.5) * 200
        );
        scene.add(sphere);
    }

    camera.position.set(0, 20, 60);

    window.addEventListener('resize', onResize);
}

function animate() {
    requestAnimationFrame(animate);

    progress += 0.0015;
    if (progress > 1) progress = 0;

    const point = curve.getPointAt(progress);
    const tangent = curve.getTangentAt(progress);

    coaster.position.copy(point);

    // ✅ FINAL FIX: upright, sliding on top of track
    const lookAhead = curve.getPointAt((progress + 0.01) % 1);
    coaster.lookAt(lookAhead);
    coaster.rotation.x = 0;
    coaster.rotation.z = 0;

    const camOffset = tangent.clone().multiplyScalar(-15).add(new THREE.Vector3(0, 8, 0));
    camera.position.copy(point.clone().add(camOffset));
    camera.lookAt(point);

    renderer.render(scene, camera);
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
