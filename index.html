<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Roller Coaster</title>
<style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
let scene, camera, renderer, coaster;
let curve, progress = 0;

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 50, 300);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(50, 50, 50);
    light.castShadow = true;
    scene.add(light);

    scene.add(new THREE.AmbientLight(0x404040));

    const groundGeo = new THREE.PlaneGeometry(500, 500);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    curve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(-50, 10, 0),
        new THREE.Vector3(0, 40, -50),
        new THREE.Vector3(50, 10, 0),
        new THREE.Vector3(0, 60, 50),
        new THREE.Vector3(-50, 10, 0)
    ]);

    const tubeGeometry = new THREE.TubeGeometry(curve, 200, 1, 16, true);
    const tubeMaterial = new THREE.MeshStandardMaterial({
        color: 0x00ffff,
        emissive: 0x004444
    });

    const track = new THREE.Mesh(tubeGeometry, tubeMaterial);
    track.castShadow = true;
    scene.add(track);

    coaster = new THREE.Group();

    const base = new THREE.Mesh(
        new THREE.BoxGeometry(4, 1, 3),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
    );

    const seat = new THREE.Mesh(
        new THREE.BoxGeometry(3, 1, 2),
        new THREE.MeshStandardMaterial({ color: 0xff0055 })
    );
    seat.position.set(0, 1, 0);

    const backrest = new THREE.Mesh(
        new THREE.BoxGeometry(3, 2, 0.5),
        new THREE.MeshStandardMaterial({ color: 0xaa0033 })
    );
    backrest.position.set(0, 2, -0.75);

    coaster.add(base, seat, backrest);

    const skin = new THREE.MeshStandardMaterial({ color: 0xffcc99 });

    // ========= BOY (KENT) =========
    const riderBoy = new THREE.Group();

    const head1 = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), skin);
    head1.position.set(0, 3.4, 0);

    const body1 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.7, 0.9, 2.5, 16),
        new THREE.MeshStandardMaterial({ color: 0x00aaff })
    );
    body1.position.set(0, 2, 0);

    const armGeo = new THREE.CylinderGeometry(0.2, 0.2, 2.5);

    const leftArm1 = new THREE.Mesh(armGeo, skin);
    leftArm1.position.set(-1, 3, 0);
    leftArm1.rotation.z = Math.PI / 2;
    leftArm1.rotation.x = -Math.PI / 2;

    const rightArm1 = new THREE.Mesh(armGeo, skin);
    rightArm1.position.set(1, 3, 0);
    rightArm1.rotation.z = -Math.PI / 2;
    rightArm1.rotation.x = -Math.PI / 2;

    const legGeo = new THREE.CylinderGeometry(0.25, 0.25, 2);

    const leftLeg1 = new THREE.Mesh(legGeo, skin);
    leftLeg1.position.set(-0.5, 1, 1);
    leftLeg1.rotation.x = Math.PI / 2;

    const rightLeg1 = new THREE.Mesh(legGeo, skin);
    rightLeg1.position.set(0.5, 1, 1);
    rightLeg1.rotation.x = Math.PI / 2;

    riderBoy.add(head1, body1, leftArm1, rightArm1, leftLeg1, rightLeg1);

    // Kent label
    const canvas1 = document.createElement('canvas');
    const ctx1 = canvas1.getContext('2d');
    canvas1.width = 256;
    canvas1.height = 128;

    ctx1.fillStyle = "white";
    ctx1.font = "bold 30px Arial";
    ctx1.textAlign = "center";
    ctx1.fillText("Kent", 128, 80);

    const tex1 = new THREE.CanvasTexture(canvas1);
    const sprite1 = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex1, transparent: true }));
    sprite1.scale.set(3, 1.5, 1);
    sprite1.position.set(0, 5, 0);

    riderBoy.add(sprite1);

    riderBoy.position.x = -0.8; // shift left


    // ========= GIRL (KATE) =========
    const riderGirl = new THREE.Group();

    const head2 = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), skin);
    head2.position.set(0, 3.4, 0);

    const body2 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.7, 0.9, 2.5, 16),
        new THREE.MeshStandardMaterial({ color: 0xff66cc }) // different color
    );
    body2.position.set(0, 2, 0);

    const leftArm2 = new THREE.Mesh(armGeo, skin);
    leftArm2.position.set(-1, 3, 0);
    leftArm2.rotation.z = Math.PI / 2;
    leftArm2.rotation.x = -Math.PI / 2;

    const rightArm2 = new THREE.Mesh(armGeo, skin);
    rightArm2.position.set(1, 3, 0);
    rightArm2.rotation.z = -Math.PI / 2;
    rightArm2.rotation.x = -Math.PI / 2;

    const leftLeg2 = new THREE.Mesh(legGeo, skin);
    leftLeg2.position.set(-0.5, 1, 1);
    leftLeg2.rotation.x = Math.PI / 2;

    const rightLeg2 = new THREE.Mesh(legGeo, skin);
    rightLeg2.position.set(0.5, 1, 1);
    rightLeg2.rotation.x = Math.PI / 2;

    riderGirl.add(head2, body2, leftArm2, rightArm2, leftLeg2, rightLeg2);

    // Kate label
    const canvas2 = document.createElement('canvas');
    const ctx2 = canvas2.getContext('2d');
    canvas2.width = 256;
    canvas2.height = 128;

    ctx2.fillStyle = "white";
    ctx2.font = "bold 30px Arial";
    ctx2.textAlign = "center";
    ctx2.fillText("Kate", 128, 80);

    const tex2 = new THREE.CanvasTexture(canvas2);
    const sprite2 = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex2, transparent: true }));
    sprite2.scale.set(3, 1.5, 1);
    sprite2.position.set(0, 5, 0);

    riderGirl.add(sprite2);

    riderGirl.position.x = 0.8; // shift right


    coaster.add(riderBoy);
    coaster.add(riderGirl);

    coaster.traverse(obj => obj.castShadow = true);
    scene.add(coaster);

    for (let i = 0; i < 30; i++) {
        const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(1.5, 16, 16),
            new THREE.MeshStandardMaterial({
                color: Math.random() * 0xffffff,
                emissive: Math.random() * 0x222222
            })
        );
        sphere.position.set(
            (Math.random() - 0.5) * 200,
            Math.random() * 30,
            (Math.random() - 0.5) * 200
        );
        scene.add(sphere);
    }

    camera.position.set(0, 20, 60);

    window.addEventListener('resize', onResize);
}

function animate() {
    requestAnimationFrame(animate);

    progress += 0.0015;
    if (progress > 1) progress = 0;

    const point = curve.getPointAt(progress);
    const tangent = curve.getTangentAt(progress);

    coaster.position.copy(point);

    const lookAhead = curve.getPointAt((progress + 0.01) % 1);
    coaster.lookAt(lookAhead);
    coaster.rotation.x = 0;
    coaster.rotation.z = 0;

    const camOffset = tangent.clone().multiplyScalar(-15).add(new THREE.Vector3(0, 8, 0));
    camera.position.copy(point.clone().add(camOffset));
    camera.lookAt(point);

    renderer.render(scene, camera);
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
